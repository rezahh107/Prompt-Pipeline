    behavioral_concept: "Canonical PR-Inspector action authority is consumed, never recomputed"
    risk: critical
    prose_source: docs/architecture/PR_INSPECTOR_ACTION_CONSUMER_CONTRACT.md
    schema_carrier: domains/pr_inspector_action/input.schema.json#action_kind
    validator: canonical_action_route
    valid_fixture: domains/pr_inspector_action/fixtures/valid.json#repair
    invalid_fixture: domains/pr_inspector_action/fixtures/invalid.json#inconsistent-recipient
    ci_command: pnpm peac:pr-inspector-renderer
    prompt_level_influence: true
    schema_validated: true
    validator_backed: true
    fixture_tested: true
    ci_enforced: true
    downstream_contract_status: documented_not_integrated
    actual_enforcement_status: source_ci_enforced_downstream_not_enforced
