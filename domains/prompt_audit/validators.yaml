    severity: error
  - id: brc_validator_backed_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'validator_backed'"
    severity: error
  - id: brc_fixture_tested_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'fixture_tested'"
    severity: error
  - id: brc_ci_enforced_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'ci_enforced'"
    severity: error
  - id: brc_downstream_contract_enforced_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'downstream_contract_enforced'"
    severity: error
  - id: brc_insufficient_evidence_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'insufficient_evidence'"
    severity: error
