domain: prompt_audit
version: "2026.3"

static_checks:
  - id: required_fields_complete
    type: contract_check
    check: all_required_fields_filled
    severity: error
  - id: taxonomy_present
    type: output_check
    check: "rendered_prompt contains 'confirmed_issue'"
    severity: warning
  - id: brc_behavioral_gate_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'Behavioral Gate'"
    severity: error
  - id: brc_enforcement_carrier_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'Enforcement Carrier'"
    severity: error
  - id: brc_semantic_illusion_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'Semantic Illusion'"
    severity: error
  - id: brc_prose_only_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'prose_only'"
    severity: error
  - id: brc_prompt_level_influence_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
    check: "rendered_prompt contains 'prompt_level_influence'"
    severity: error
  - id: brc_schema_backed_rendered
    type: output_check
    applies_when: "audit_framework == 'brc'"
