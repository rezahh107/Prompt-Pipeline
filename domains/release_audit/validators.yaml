domain: release_audit
version: "2026.3"

static_checks:
  - id: required_fields_complete
    type: contract_check
    check: all_required_fields_filled
    severity: error

  - id: evidence_rules_present
    type: output_check
    check: "rendered_prompt contains '[EVIDENCE AND ACCURACY RULES]'"
    severity: error

  - id: decision_boundary_present
    type: output_check
    check: "rendered_prompt contains '[DECISION BOUNDARY]'"
    severity: error

  - id: readiness_sections_present
    type: output_check
    check: "rendered_prompt contains '[READINESS CHECKS]'"
    applies_when: "subtype == 'readiness_review'"
    severity: error

  - id: evidence_sections_present
    type: output_check
    check: "rendered_prompt contains '[EVIDENCE REVIEW]'"
    applies_when: "subtype == 'evidence_review'"
    severity: error

  - id: no_fake_results_rule_present
    type: output_check
    check: "rendered_prompt contains 'Do not fabricate test results'"
    severity: error

  - id: output_format_present
    type: output_check
    check: "rendered_prompt contains '[OUTPUT FORMAT]'"
    severity: error

  - id: template_renders_non_empty
    type: output_check
    check: "len(rendered_prompt) > 200"
    severity: error

  - id: reasonable_prompt_length
    type: output_check
    check: "len(rendered_prompt) <= 3500"
    severity: warning
