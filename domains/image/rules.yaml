domain: image
version: "2026.3"

rules:
  - id: image.overlay.exact_text
    peac_rule_id: image.overlay.exact_text
    source_ref: kb/04-templates/image.md#image.overlay.exact_text
    source_hash: 943b0ec351cdd164
    last_synced: "2026-07-03"
    priority: critical
    rule: "Exact Persian text, typography, official logos, QR codes, and formal identifiers must be handled by deterministic overlay when fidelity matters."

  - id: image.identity.preservation
    peac_rule_id: image.identity.preservation
    source_ref: kb/04-templates/image.md#image.identity.preservation
    source_hash: 3bdc1b77ee1d5bb3
    last_synced: "2026-07-03"
    priority: critical
    rule: "People visible in a source photo must be preserved: count, faces, identity, age impression, skin tone, clothing, posture, and hands."

  - id: image.safe_area
    peac_rule_id: image.safe_area
    source_ref: kb/04-templates/image.md#image.safe_area
    source_hash: 0e1d316c3dad6fea
    last_synced: "2026-07-03"
    priority: high
    rule: "When overlay is needed, reserve a clean safe area, default top 25%."

  - id: image.priority_order
    peac_rule_id: image.priority_order
    source_ref: kb/04-templates/image.md#image.priority_order
    source_hash: cd98854ffad79a43
    last_synced: "2026-07-03"
    priority: high
    rule: "Image prompts should declare the priority order instead of relying on a long unranked instruction list."

  - id: image.protected_editable
    peac_rule_id: image.protected_editable
    source_ref: kb/04-templates/image.md#image.protected_editable
    source_hash: 4dfecfb7d62b738d
    last_synced: "2026-07-03"
    priority: high
    rule: "Image edit prompts should separate protected source-photo elements from editable presentation elements."

  - id: image.child_safety
    peac_rule_id: safety.child_student
    source_ref: kb/09-safety-ethics.md#safety.child_student
    source_hash: 0211fc63873c5c43
    last_synced: "2026-07-03"
    priority: critical
    rule: "For students or minors, do not alter apparent age, over-manipulate facial features, or fabricate educational achievements."
