case_id: image.identity_conflict_error.v1
description: Heavy beautification should fail when realistic identity-preserving style is active.
domain: image
subtype: identity_preserving_edit
version: "2026.3"

inputs:
  image_type: portrait
  subject_count: 1
  has_source_photo: true
  realistic_style: true
  heavy_beautify: true

expected:
  domain: image
  subtype: identity_preserving_edit
  validation:
    should_pass: false
    expected_errors:
      - "realistic_style + heavy_beautify"
