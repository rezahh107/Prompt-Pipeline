case_id: image.missing_document_type.v1
description: Missing document_type should fail when has_document is true.
domain: image
subtype: identity_preserving_edit
version: "2026.3"

inputs:
  image_type: portrait
  subject_count: 1
  has_source_photo: true
  has_document: true

expected:
  domain: image
  subtype: identity_preserving_edit
  validation:
    should_pass: false
    expected_errors:
      - "Missing required input(s): document_type"
