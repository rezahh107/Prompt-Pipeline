case_id: prompt-generation-master-basic
version: "2026.3"
description: "Generate a reusable repository audit prompt."
domain: prompt_generation
subtype: master_prompt

inputs:
  task: "Create a prompt that asks an LLM to audit a GitHub repository and produce an evidence-based improvement report."
  desired_output: "A copy-ready prompt with role, mission, repository access rules, evidence policy, output format, and self-check."
  target_environment: "ChatGPT"
  target_model: "GPT"
  prompt_language: English
  explanation_language: Persian
  target_output_language: Persian
  strictness: production-grade
  requires_current_information: true
  uses_external_tools: true
  sensitive_or_high_risk: false
  requires_structured_output: true
  success_criteria:
    - "The generated prompt is copy-ready and structured."
    - "The generated prompt requires evidence for repository claims."
    - "The generated prompt separates confirmed facts from assumptions."
  failure_modes:
    - "The prompt permits unsourced repository claims."
    - "The prompt allows file modification without explicit user authorization."
    - "The prompt omits validation or self-check criteria."
  eval_suite:
    - prompt_generation_quality/required_sections_present
    - prompt_generation_quality/governance_rules_present
  user_constraints: "The target model must not modify files unless explicitly asked."

expected:
  risk_level: high
  requires_human_review: true
  validation:
    should_pass: true
