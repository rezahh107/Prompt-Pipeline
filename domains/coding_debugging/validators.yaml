domain: coding_debugging
version: "2026.3"

static_checks:
  - id: required_fields_complete
    type: contract_check
    check: all_required_fields_filled
    severity: error

  - id: execution_boundary_present
    type: output_check
    check: "rendered_prompt contains '[EXECUTION BOUNDARY]'"
    severity: error

  - id: evidence_rules_present
    type: output_check
    check: "rendered_prompt contains '[EVIDENCE AND ACCURACY RULES]'"
    severity: error

  - id: patch_protocol_present
    type: output_check
    check: "rendered_prompt contains '[PATCH PROTOCOL]'"
    applies_when: "include_patch_protocol == true"
    severity: error

  - id: tests_required_when_enabled
    type: output_check
    check: "rendered_prompt contains 'Tests to run'"
    applies_when: "require_tests == true"
    severity: error

  - id: tests_absent_when_disabled
    type: output_check
    check: "rendered_prompt not contains 'Tests to run'"
    applies_when: "require_tests == false"
    severity: error

  - id: patch_absent_when_disabled
    type: output_check
    check: "rendered_prompt not contains '[PATCH PROTOCOL]'"
    applies_when: "include_patch_protocol == false"
    severity: error

  - id: debugging_sections_present
    type: output_check
    check: "rendered_prompt contains '[DEBUGGING PROTOCOL]'"
    applies_when: "subtype == 'debugging'"
    severity: error

  - id: debugging_unknowns_present
    type: output_check
    check: "rendered_prompt contains 'Remaining unknowns'"
    applies_when: "subtype == 'debugging'"
    severity: error

  - id: code_review_sections_present
    type: output_check
    check: "rendered_prompt contains '[REVIEW FOCUS]'"
    applies_when: "subtype == 'code_review'"
    severity: error

  - id: code_review_location_evidence_table_present
    type: output_check
    check: "rendered_prompt contains 'location | evidence'"
    applies_when: "subtype == 'code_review'"
    severity: error

  - id: no_unrelated_rewrite_rule_present
    type: output_check
    check: "rendered_prompt contains 'Do not rewrite unrelated'"
    severity: error

  - id: no_fake_tests_rule_present
    type: output_check
    check: "rendered_prompt contains 'Do not fabricate test results'"
    severity: error

  - id: security_context_present_when_sensitive
    type: output_check
    check: "rendered_prompt contains 'Security context:'"
    applies_when: "security_sensitive == true"
    severity: error

  - id: forbidden_combinations_clear
    type: forbidden_combination
    check: all_forbidden_combinations_clear
    severity: warning

  - id: template_renders_non_empty
    type: output_check
    check: "len(rendered_prompt) > 200"
    severity: error

  - id: reasonable_prompt_length
    type: output_check
    check: "len(rendered_prompt) <= 3500"
    severity: warning
