domain: coding_debugging
version: "2026.3"

rules:
  - id: coding_debugging.evidence_first
    priority: critical
    rule: "Code and debugging claims must be grounded in available code, diffs, logs, errors, tests, or documentation."

  - id: coding_debugging.no_unverified_results
    priority: critical
    rule: "Generated prompts must prohibit unverified test results, command output, file paths, versions, and passing CI claims."

  - id: coding_debugging.patch_only
    priority: high
    rule: "When a patch is requested, prefer the smallest safe patch over broad rewrites."

  - id: coding_debugging.tests_required
    priority: high
    rule: "Prompts for code changes should request tests or explicit test gaps."

  - id: coding_debugging.root_cause_uncertainty
    priority: high
    rule: "Debugging prompts must separate confirmed evidence from likely causes and remaining unknowns."
