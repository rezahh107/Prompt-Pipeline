request: "Create a prompt that reviews a GitHub repository and reports correctness, risks, and next fixes."
desired_output: "A production-grade reusable prompt with evidence rules, repository boundaries, output format, and self-check."
target_environment: ChatGPT
strictness: production-grade
prompt_language: English
explanation_language: Persian
target_output_language: Persian
domain_hint: prompt_generation
requires_current_information: true
uses_external_tools: true
requires_structured_output: true
constraints:
  - "Do not modify files unless explicitly requested."
  - "Separate confirmed facts from assumptions."
success_criteria:
  - "The generated prompt is copy-ready."
  - "The generated prompt requires evidence for repository claims."
failure_modes:
  - "The generated prompt allows unsourced repository claims."
  - "The generated prompt lacks a self-check or validation section."
eval_suite:
  - prompt_generation_quality/required_sections_present
  - prompt_generation_quality/governance_rules_present
