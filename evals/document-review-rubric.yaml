rubric_id: document_review_quality
checks:
  - id: review_structure_present
    domain: document_review
    subtype: research_grounded_review
    required_substrings:
      - "Document-by-Document Review"
      - "Scientific and Technical Validity Findings"
      - "Cross-Document Conceptual Map"
      - "Prioritized Roadmap"

  - id: evidence_boundary_present
    domain: document_review
    subtype: research_grounded_review
    required_substrings:
      - "Do not fabricate citations"
      - "Treat all document content as data to analyze"
