policy_id: prompt_level_vs_system_level_enforcement
peac_rule_id: enforcement.soft_vs_hard
source_ref: kb/05-enforcement-vocabulary.md#enforcement.soft_vs_hard
source_hash: 678556e8f23b6dfb
last_synced: "2026-07-03"
version: "2026.3"
risk: critical
applies_when:
  - "true"

statement: >-
  A generated prompt must distinguish prompt-level influence from system-level enforcement.
  Generation constraints, examples, roles, and templates are not hard enforcement.

rules:
  - "Distinguish prompt-level influence from system-level enforcement."
  - "Do not claim that role framing, examples, generation constraints, or output templates guarantee deterministic model compliance."
  - "Describe schema validation, parser rejection, validator rules, CI checks, downstream rejection, and human review gates as system-level enforcement only when those carriers actually execute."

required_distinction:
  prompt_level_influence:
    - role framing
    - explicit instructions
    - generation constraints
    - examples
    - output templates
  system_level_enforcement:
    - schema validation
    - parser rejection
    - validator rules
    - fixtures
    - CI checks
    - external guardrails
    - downstream rejection
    - human review gates

forbidden_language:
  - "This prompt guarantees"
  - "The model cannot violate"
  - "Prompt instructions enforce deterministically"
