policy_id: evidence_and_citation_policy
peac_rule_id: evidence.current_claims_need_sources
source_ref: kb/11-policy-and-domain-rule-anchors.md#evidence.current_claims_need_sources
source_hash: 3d10cc8a2a674f9f
last_synced: "2026-07-03"
version: "2026.3"
risk: high
applies_when:
  - "true"

statement: >-
  Generated prompts must require evidence, recency checks, and uncertainty labels for
  claims that may change over time or affect high-impact decisions.

rules:
  - "Require evidence, recency checks, and explicit uncertainty labels for current, unstable, official, or high-impact claims."
  - "Do not fabricate citations, benchmark results, or unsupported current claims."

required_when:
  - exact_factual_claims
  - current_or_unstable_dependencies
  - legal_medical_financial
  - security_sensitive
  - official_information
  - model_or_api_capability

claim_labels:
  - established
  - provider_documented
  - research_supported
  - preprint_supported
  - industry_best_practice
  - engineering_heuristic
  - project_specific
  - needs_verification

forbidden:
  - fabricated citations
  - fabricated benchmark results
  - unsupported current claims
