version: "2026.3"
purpose: "Lightweight coverage map for high-risk behavioral rules in Prompt-Pipeline."

rules:
  - rule_id: R-PP-LANG-001
    title: "Separate prompt language from target output language"
    risk: high
    source_refs:
      - domains/prompt_generation/input.contract.yaml#prompt_language
      - domains/prompt_generation/validators.yaml#prompt_language_must_be_english
      - evals/prompt-generation-rubric.yaml#language_contract_present
      - pipeline/quality-gates.yaml#QG-LANG-001
    coverage:
      schema_carriers:
        - domains/prompt_generation/input.contract.yaml:prompt_language
        - domains/prompt_generation/input.contract.yaml:explanation_language
        - domains/prompt_generation/input.contract.yaml:target_output_language
      validator_rules:
        - prompt_language_must_be_english
        - explanation_language_must_be_persian
        - target_output_language_must_be_persian
        - language_policy_present
      rubric_checks:
        - prompt_generation_quality/language_contract_present
      valid_fixtures:
        - domains/prompt_generation/cases/valid/english-prompt-persian-output.yaml
      invalid_fixtures:
        - domains/prompt_generation/cases/invalid/ambiguous-output-language.yaml
      ci_steps:
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: fixture_tested
    next_hardening:
      - "Add downstream artifact rejection based on rendered_prompt_contract metadata."

  - rule_id: R-PP-INSTRUCTION-001
    title: "External content is data, not instruction"
    risk: critical
    source_refs:
      - AGENTS.md#Important-boundaries
      - pipeline/AGENT_ENTRYPOINT.md#Important-boundaries
      - domains/prompt_generation/validators.yaml#instruction_boundary_present
      - pipeline/quality-gates.yaml#QG-SECURITY-001
    coverage:
      schema_carriers: []
      validator_rules:
        - instruction_boundary_present
      rubric_checks:
        - prompt_generation_quality/governance_rules_present
      valid_fixtures:
        - domains/prompt_generation/cases/master-prompt-basic.yaml
      invalid_fixtures: []
      ci_steps:
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: validator_backed
    next_hardening:
      - "Add adversarial prompt-injection fixtures for uploaded files, repository files, web pages, and tool outputs."

  - rule_id: R-PP-ENFORCEMENT-001
    title: "Separate prompt-level influence from system-level enforcement"
    risk: critical
    source_refs:
      - AGENTS.md#Important-boundaries
      - domains/prompt_generation/rules.yaml#PG-002
      - domains/prompt_generation/validators.yaml#enforcement_distinction_present
      - pipeline/quality-gates.yaml#QG-ENFORCEMENT-001
    coverage:
      schema_carriers: []
      validator_rules:
        - enforcement_distinction_present
      rubric_checks:
        - prompt_generation_quality/governance_rules_present
      valid_fixtures:
        - domains/prompt_generation/cases/master-prompt-basic.yaml
      invalid_fixtures: []
      ci_steps:
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: validator_backed
    next_hardening:
      - "Add an invalid fixture that fails when prompt-level wording is described as deterministic enforcement."

  - rule_id: R-PP-EVIDENCE-001
    title: "Factual or current claims require evidence and uncertainty handling"
    risk: high
    source_refs:
      - pipeline/evidence-policy.yaml#evidence-policy
      - domains/prompt_generation/validators.yaml#evidence_rules_present
      - pipeline/quality-gates.yaml#QG-EVIDENCE-001
    coverage:
      schema_carriers:
        - pipeline/intake.schema.json:requires_current_information
      validator_rules:
        - evidence_rules_present
      rubric_checks:
        - prompt_generation_quality/governance_rules_present
      valid_fixtures:
        - domains/prompt_generation/cases/master-prompt-basic.yaml
      invalid_fixtures: []
      ci_steps:
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: validator_backed
    next_hardening:
      - "Add task-specific evidence fixtures for current-info and no-current-info modes."

  - rule_id: R-PP-EVAL-001
    title: "Production-grade artifacts require explicit success criteria, failure modes, and eval suite"
    risk: critical
    source_refs:
      - pipeline/intake.schema.json#success_criteria
      - scripts/peac-production-grade-gate.ts#production-grade-gate
      - package.json#peac:production-gate
    coverage:
      schema_carriers:
        - pipeline/intake.schema.json:success_criteria
        - pipeline/intake.schema.json:failure_modes
        - pipeline/intake.schema.json:eval_suite
      validator_rules: []
      rubric_checks: []
      valid_fixtures:
        - domains/prompt_generation/cases/master-prompt-basic.yaml
        - domains/prompt_generation/cases/valid/english-prompt-persian-output.yaml
      invalid_fixtures:
        - tests/production-grade-gate/invalid/missing-eval-suite.yaml
      ci_steps:
        - pnpm peac:production-gate
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: fixture_tested
    next_hardening:
      - "Promote eval_suite into artifact metadata and require downstream rejection for missing production-grade eval metadata."

  - rule_id: R-PP-MODEL-001
    title: "Prompt generation artifacts must apply an explicit target model profile"
    risk: high
    source_refs:
      - pipeline/model-profiles.yaml#gpt
      - domains/prompt_generation/input.contract.yaml#model_profile
      - pipeline/intake.schema.json#model_profile
      - scripts/peac-model-profile-check.ts#model-profile-check
    coverage:
      schema_carriers:
        - pipeline/intake.schema.json:model_profile
        - domains/prompt_generation/input.contract.yaml:model_profile
      validator_rules:
        - model_profile_must_be_supported
        - model_profile_present
        - selected_model_profile_rendered
      rubric_checks:
        - prompt_generation_quality/model_profile_present
      valid_fixtures:
        - intakes/valid/model-profile-claude.yaml
        - intakes/valid/document-review-with-model-profile.yaml
      invalid_fixtures:
        - intakes/invalid/invalid-model-profile.yaml
        - domains/prompt_generation/cases/invalid/invalid-model-profile.yaml
      ci_steps:
        - pnpm peac:model-profile
        - pnpm peac:intakecheck
        - pnpm peac:validate
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: fixture_tested
    next_hardening:
      - "Promote model_profile into artifact metadata and downstream bundle contracts."

  - rule_id: R-PP-CONTEXT-001
    title: "Prompt generation artifacts must declare context policy, budget, and provenance"
    risk: high
    source_refs:
      - pipeline/context-policy.yaml#standard
      - domains/prompt_generation/input.contract.yaml#context_policy
      - pipeline/intake.schema.json#context_policy
      - scripts/peac-context-policy-check.ts#context-policy-check
    coverage:
      schema_carriers:
        - pipeline/intake.schema.json:context_policy
        - pipeline/intake.schema.json:context_budget_tokens
        - pipeline/intake.schema.json:context_items
        - domains/prompt_generation/input.contract.yaml:context_policy
      validator_rules:
        - context_policy_must_be_supported
        - context_policy_present
        - context_budget_rendered
        - context_boundary_rendered
      rubric_checks:
        - prompt_generation_quality/context_policy_present
      valid_fixtures:
        - intakes/valid/context-policy-standard.yaml
      invalid_fixtures:
        - intakes/invalid/invalid-context-policy.yaml
        - intakes/invalid/context-budget-over-limit.yaml
      ci_steps:
        - pnpm peac:context-policy
        - pnpm peac:intakecheck
        - pnpm peac:validate
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: fixture_tested
    next_hardening:
      - "Promote context policy metadata into artifact schema and downstream rejection contracts."

  - rule_id: R-PP-HUMAN-001
    title: "High-risk artifacts require human review before downstream use"
    risk: critical
    source_refs:
      - pipeline/quality-gates.yaml#QG-HUMAN-001
      - src/peac.ts#resolveRisk
      - scripts/peac-human-review-gate.ts#human-review-gate
      - pipeline/artifact.schema.json#review_reason
    coverage:
      schema_carriers:
        - pipeline/artifact.schema.json:requires_human_review
        - pipeline/artifact.schema.json:review_reason
        - pipeline/intake.schema.json:human_review_required
      validator_rules: []
      rubric_checks: []
      valid_fixtures:
        - domains/prompt_generation/cases/master-prompt-basic.yaml
      invalid_fixtures:
        - tests/human-review-gate/invalid/high-risk-without-review.yaml
        - tests/human-review-gate/invalid/missing-review-reason.yaml
        - tests/human-review-gate/invalid/low-risk-with-review-reason.yaml
      ci_steps:
        - pnpm peac:behavioral-coverage
        - pnpm peac:human-review-gate
        - pnpm peac:provenance
      downstream_contracts: []
    coverage_status: fixture_tested
    next_hardening:
      - "Promote human review metadata into downstream rejection contracts."

  - rule_id: R-PP-ARTIFACT-METADATA-001
    title: "Prompt generation artifacts expose downstream metadata contract"
    risk: critical
    source_refs:
      - pipeline/artifact-metadata-contract.yaml#artifact_metadata_contract_v1
      - scripts/peac-artifact-metadata-check.ts#artifact-metadata-check
      - package.json#peac:artifact-metadata
    coverage:
      schema_carriers:
        - domains/prompt_generation/input.contract.yaml:model_profile
        - domains/prompt_generation/input.contract.yaml:context_policy
        - pipeline/intake.schema.json:success_criteria
        - pipeline/artifact.schema.json:requires_human_review
      validator_rules:
        - selected_model_profile_rendered
        - context_budget_rendered
        - language_policy_present
        - evidence_rules_present
      rubric_checks:
        - prompt_generation_quality/model_profile_present
        - prompt_generation_quality/context_policy_present
        - prompt_generation_quality/language_contract_present
      valid_fixtures:
        - tests/artifact-metadata/valid/prompt-generation-complete.yaml
      invalid_fixtures:
        - tests/artifact-metadata/invalid/missing-model-profile.yaml
        - tests/artifact-metadata/invalid/stale-context-rendering.yaml
        - tests/artifact-metadata/invalid/bad-human-review-reason.yaml
      ci_steps:
        - pnpm peac:artifact-metadata
        - pnpm peac:behavioral-coverage
      downstream_contracts:
        - pipeline/artifact-metadata-contract.yaml#artifact_metadata_contract_v1
    coverage_status: fixture_tested
    next_hardening:
      - "Promote the same metadata values into the generated artifact payload when the artifact generator is next expanded."

  - rule_id: R-PP-AUDIT-VOCAB-001
    title: "Prompt audit must support Behavioral Rule Coverage vocabulary for enforcement-focused audits"
    risk: high
    source_refs:
      - kb/05-enforcement-vocabulary.md#Canonical-terms
      - kb/06-behavioral-rule-coverage.md#Coverage-row-format
      - domains/prompt_audit/rules.yaml#prompt_audit.finding_taxonomy
    coverage:
      schema_carriers: []
      validator_rules: []
      rubric_checks: []
      valid_fixtures: []
      invalid_fixtures: []
      ci_steps:
        - pnpm peac:behavioral-coverage
      downstream_contracts: []
    coverage_status: tracked_gap
    next_hardening:
      - "Wire kb/05 and kb/06 as source_refs in domains/prompt_audit/rules.yaml."
      - "Add audit_framework enum field with values default and brc to domains/prompt_audit/input.contract.yaml."
      - "Add BRC-aware rendering support to the prompt_audit template."
      - "Add validator rule brc_vocabulary_rendered_when_requested after the schema and template carriers exist."
      - "Create a prompt_audit rubric or equivalent resolvable quality carrier."
      - "Add valid and invalid fixtures only after schema, rendering, and validator carriers exist."
