output_contracts:
  version: "2026.3"

  rendered_prompt:
    required_sections:
      - ROLE
      - MISSION
      - INPUTS
      - TASK STEPS
      - CONSTRAINTS
      - OUTPUT FORMAT
      - SELF-CHECK BEFORE FINAL ANSWER
    recommended_sections:
      - CONTEXT
      - EVIDENCE AND ACCURACY RULES
      - SAFETY AND INSTRUCTION BOUNDARY
      - VALIDATION OR EVALUATION

  visible_response:
    allowed:
      - selected_domain
      - missing_required_fields
      - rendered_prompt
      - validation_notes
      - human_review_status
      - next_command
    forbidden:
      - hidden_state_claim
      - internal_reasoning_trace
      - fabricated_test_result
      - fabricated_repository_state
      - raw_irrelevant_kb_dump

  case_yaml:
    required_fields:
      - case_id
      - domain
      - subtype
      - inputs
      - expected

  pr_inspector_action_renderer:
    input_contract: domains/pr_inspector_action/input.schema.json
    output_contract: domains/pr_inspector_action/output.schema.json
    route_contract: domains/pr_inspector_action/route.json
    success_stdout: one_complete_json_envelope
    failure_stdout: empty
    diagnostics_stream: stderr
    deterministic_prompt_hash: sha256_final_utf8_bytes
    no_prompt_value: null
    action_authority: consumer_supplied_and_validated

  bundle:
    required_files:
      - README.md
      - pipeline/AGENT_ENTRYPOINT.md
      - docs/MASTER_REFERENCE.md
      - kb/00-INDEX.md
      - pipeline/intake.schema.json
      - pipeline/router.yaml
      - pipeline/quality-gates.yaml
      - pipeline/evidence-policy.yaml
      - pipeline/output-contracts.yaml
