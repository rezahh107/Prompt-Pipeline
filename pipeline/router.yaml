routing_strategy:
  primary: evidence_concept_score
  fallback: general
  tiebreak: score_then_confidence_then_priority_then_domain
  scoring:
    concept_weight: 4
    negative_weight: -4
    confidence_base: 0.5
    confidence_step: 0.05
    confidence_max: 0.96

risk_assessment:
  factors:
    - domain
    - subject_identity
    - minors_or_students
    - external_files
    - tool_actions
    - irreversible_actions
    - exact_factual_claims
    - legal_medical_financial
    - requires_current_information
    - uses_external_tools
    - sensitive_or_high_risk

domains:
  prompt_generation:
    enabled: true
    priority: 90
    confidence_threshold: 0.82
    evidence_concepts:
      - id: prompt_meta_intent
        weight: 8
        keywords:
          - create prompt
          - generate prompt
          - reusable prompt
          - ساخت پرامپت
          - تولید پرامپت
          - پرامپت بده
        patterns:
          - '\b(create|generate|write|build|draft|design)\b[\s\S]{0,80}\b(a\s+)?prompt\b'
          - '\bprompt\b[\s\S]{0,80}\b(for|to|that)\b'
          - '(ساخت|تولید|نوشتن|طراحی)[\s\S]{0,80}پرامپت'
          - 'پرامپت[\s\S]{0,50}(بده|بساز|طراحی کن)'
        negative_keywords:
          - audit prompt
          - review prompt
          - prompt audit
          - ممیزی پرامپت
          - بررسی پرامپت

  document_review:
    enabled: true
    priority: 75
    confidence_threshold: 0.68
    evidence_concepts:
      - id: document_review_intent
        weight: 4
        keywords:
          - document review
          - review documents
          - document critique
          - بررسی سند
          - نقد سند
          - بررسی اسناد
        patterns:
          - 'review[\s\S]{0,40}documents?'
          - 'document[\s\S]{0,40}(review|critique)'
          - 'بررسی[\s\S]{0,40}(سند|اسناد)'

  ai_workflow_design:
    enabled: true
    priority: 70
    confidence_threshold: 0.68
    evidence_concepts:
      - id: workflow_design_intent
        weight: 4
        keywords:
          - workflow design
          - automation pipeline
          - agent workflow
          - pipeline design
          - پایپلاین
          - ورکفلو
          - گردش کار
          - اتوماسیون
        patterns:
          - '(workflow|pipeline)[\s\S]{0,40}(design|architecture)'
          - '(طراحی|ساخت)[\s\S]{0,40}(پایپلاین|ورکفلو|گردش کار)'

  multimodal:
    enabled: true
    priority: 85
    confidence_threshold: 0.82
    evidence_concepts:
      - id: multimodal_explicit
        weight: 8
        keywords:
          - multimodal
          - multimodal prompt
          - چندوجهی
      - id: exact_text_logo_reliability
        weight: 8
        keywords:
          - overlay-safe
          - exact text
          - text logo reliability
          - logo fidelity
          - متن دقیق
          - لوگوی دقیق
        patterns:
          - 'exact[\s\S]{0,40}(text|logo)'
          - '(text|logo)[\s\S]{0,40}(fidelity|reliability|overlay)'
          - 'متن[\s\S]{0,40}دقیق'
          - 'لوگو[\s\S]{0,40}(دقیق|اصلی|فیدلیتی|کیفیت)'

  general:
    enabled: true
    is_fallback: true
    max_risk_level: low
    priority: 0
    keywords:
      - prompt
      - پرامپت
      - تحلیل
      - تصمیم
      - راهنما
    confidence_threshold: 0.5

  prompt_audit:
    enabled: true
    priority: 80
    confidence_threshold: 0.68
    evidence_concepts:
      - id: prompt_audit_intent
        weight: 4
        keywords:
          - audit prompt
          - review prompt
          - prompt audit
          - ممیزی پرامپت
          - بررسی پرامپت
          - ارزیابی پرامپت
        patterns:
          - '(audit|review|critique)[\s\S]{0,40}prompt'
          - 'prompt[\s\S]{0,40}(audit|review|critique)'
          - '(ممیزی|بررسی|ارزیابی)[\s\S]{0,40}پرامپت'

  prompt_refactor:
    enabled: true
    priority: 78
    confidence_threshold: 0.68
    evidence_concepts:
      - id: prompt_refactor_intent
        weight: 4
        keywords:
          - improve prompt
          - refactor prompt
          - بازنویسی پرامپت
          - اصلاح پرامپت
          - بهتر کردن پرامپت
        patterns:
          - '(improve|refactor|rewrite)[\s\S]{0,40}prompt'
          - '(بازنویسی|اصلاح|بهتر کردن)[\s\S]{0,40}پرامپت'

  repo_review:
    enabled: true
    priority: 82
    confidence_threshold: 0.68
    evidence_concepts:
      - id: repository_review_intent
        weight: 4
        keywords:
          - repository critique
          - repository analysis
          - source critique
          - بررسی ریپو
          - بررسی مخزن
          - ممیزی سورس
          - بررسی سورس
        patterns:
          - 'repository[\s\S]{0,80}audit'
          - 'source[\s\S]{0,80}audit'
          - 'بررسی[\s\S]{0,80}ریپو'
          - 'بررسی[\s\S]{0,80}مخزن'

  coding_debugging:
    enabled: true
    priority: 82
    confidence_threshold: 0.68
    evidence_concepts:
      - id: code_review_or_debug_intent
        weight: 4
        keywords:
          - code review
          - review code
          - debug code
          - debugging
          - runtime error
          - failing test
          - patch protocol
          - بررسی کد
          - دیباگ
          - خطای کد
          - خطای تست
          - اصلاح کد
        patterns:
          - 'code[\s\S]{0,40}review'
          - 'review[\s\S]{0,40}code'
          - 'debug[\s\S]{0,40}code'
          - 'failing[\s\S]{0,40}test'
          - 'بررسی[\s\S]{0,40}کد'
          - 'خطای[\s\S]{0,40}کد'

  image:
    enabled: true
    priority: 65
    confidence_threshold: 0.68
    evidence_concepts:
      - id: image_generation_or_edit_intent
        weight: 4
        keywords:
          - عکس
          - تصویر
          - پرتره
          - ویرایش عکس
          - image
          - photo
          - portrait
        patterns:
          - 'پرامپت[\s\S]{0,50}تصویر'
          - 'ویرایش[\s\S]{0,50}عکس'
          - 'عکس[\s\S]{0,50}پرامپت'
