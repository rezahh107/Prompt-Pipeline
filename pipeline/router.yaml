routing_strategy:
  primary: keyword_match
  fallback: not_implemented
  tiebreak: depends_on_execution_mode

risk_assessment:
  factors:
    - domain
    - subject_identity
    - minors_or_students
    - external_files
    - tool_actions
    - irreversible_actions
    - exact_factual_claims
    - legal_medical_financial
    - requires_current_information
    - uses_external_tools
    - sensitive_or_high_risk

domains:
  prompt_generation:
    enabled: true
    keywords:
      - create prompt
      - generate prompt
      - reusable prompt
      - ساخت پرامپت
      - تولید پرامپت
      - پرامپت بده
    confidence_threshold: 0.82

  document_review:
    enabled: true
    keywords:
      - document review
      - review documents
      - document critique
      - بررسی سند
      - نقد سند
      - بررسی اسناد
    confidence_threshold: 0.82

  ai_workflow_design:
    enabled: true
    keywords:
      - workflow design
      - automation pipeline
      - agent workflow
      - pipeline design
      - پایپلاین
      - ورکفلو
      - گردش کار
      - اتوماسیون
    confidence_threshold: 0.82

  multimodal:
    enabled: true
    keywords:
      - multimodal
      - image prompt design
      - visual prompt
      - overlay-safe
      - چندوجهی
      - پرامپت تصویر
      - لوگو
      - متن روی تصویر
    confidence_threshold: 0.82

  general:
    enabled: true
    is_fallback: true
    max_risk_level: low
    keywords:
      - prompt
      - پرامپت
      - تحلیل
      - تصمیم
      - راهنما
    confidence_threshold: 0.5

  prompt_audit:
    enabled: true
    keywords:
      - audit prompt
      - review prompt
      - prompt audit
      - ممیزی پرامپت
      - بررسی پرامپت
      - ارزیابی پرامپت
    confidence_threshold: 0.75

  prompt_refactor:
    enabled: true
    keywords:
      - improve prompt
      - refactor prompt
      - بازنویسی پرامپت
      - اصلاح پرامپت
      - بهتر کردن پرامپت
    confidence_threshold: 0.75

  repo_review:
    enabled: true
    keywords:
      - repository audit
      - repository critique
      - repository analysis
      - source audit
      - source critique
      - بررسی ریپو
      - بررسی مخزن
      - ممیزی سورس
      - بررسی سورس
    patterns:
      - "repository[\\s\\S]*audit"
      - "source[\\s\\S]*audit"
      - "بررسی[\\s\\S]*ریپو"
      - "بررسی[\\s\\S]*مخزن"
    confidence_threshold: 0.8

  coding_debugging:
    enabled: true
    keywords:
      - code review
      - review code
      - debug code
      - debugging
      - runtime error
      - failing test
      - patch protocol
      - بررسی کد
      - دیباگ
      - خطای کد
      - خطای تست
      - اصلاح کد
    patterns:
      - "code[\\s\\S]*review"
      - "debug[\\s\\S]*code"
      - "failing[\\s\\S]*test"
      - "بررسی[\\s\\S]*کد"
      - "خطای[\\s\\S]*کد"
    confidence_threshold: 0.8

  image:
    enabled: true
    keywords:
      - عکس
      - تصویر
      - پرتره
      - ویرایش عکس
      - image
      - photo
      - portrait
    patterns:
      - "پرامپت.*تصویر"
      - "ویرایش.*عکس"
      - "عکس.*پرامپت"
    confidence_threshold: 0.8
