routing_strategy:
  primary: weighted_score
  fallback: general
  tiebreak: score_then_priority_then_domain
  scoring:
    keyword_weight: 3
    pattern_weight: 4
    negative_weight: -6
    confidence_base: 0.55
    confidence_step: 0.1

risk_assessment:
  factors:
    - domain
    - subject_identity
    - minors_or_students
    - external_files
    - tool_actions
    - irreversible_actions
    - exact_factual_claims
    - legal_medical_financial
    - requires_current_information
    - uses_external_tools
    - sensitive_or_high_risk

domains:
  prompt_generation:
    enabled: true
    priority: 90
    keywords:
      - create prompt
      - generate prompt
      - reusable prompt
      - ساخت پرامپت
      - تولید پرامپت
      - پرامپت بده
    negative_keywords:
      - audit prompt
      - review prompt
      - prompt audit
      - ممیزی پرامپت
      - بررسی پرامپت
    confidence_threshold: 0.82

  document_review:
    enabled: true
    priority: 75
    keywords:
      - document review
      - review documents
      - document critique
      - بررسی سند
      - نقد سند
      - بررسی اسناد
    confidence_threshold: 0.82

  ai_workflow_design:
    enabled: true
    priority: 70
    keywords:
      - workflow design
      - automation pipeline
      - agent workflow
      - pipeline design
      - پایپلاین
      - ورکفلو
      - گردش کار
      - اتوماسیون
    confidence_threshold: 0.82

  multimodal:
    enabled: true
    priority: 85
    keywords:
      - multimodal
      - multimodal prompt
      - overlay-safe
      - exact text
      - text logo reliability
      - logo fidelity
      - چندوجهی
      - لوگو
      - متن روی تصویر
      - متن دقیق
      - لوگوی دقیق
    patterns:
      - 'exact[\s\S]*(text|logo)'
      - '(text|logo)[\s\S]*reliability'
      - 'متن[\s\S]*دقیق'
      - 'لوگو[\s\S]*دقیق'
    confidence_threshold: 0.82

  general:
    enabled: true
    is_fallback: true
    max_risk_level: low
    priority: 0
    keywords:
      - prompt
      - پرامپت
      - تحلیل
      - تصمیم
      - راهنما
    confidence_threshold: 0.5

  prompt_audit:
    enabled: true
    priority: 80
    keywords:
      - audit prompt
      - review prompt
      - prompt audit
      - ممیزی پرامپت
      - بررسی پرامپت
      - ارزیابی پرامپت
    confidence_threshold: 0.75

  prompt_refactor:
    enabled: true
    priority: 78
    keywords:
      - improve prompt
      - refactor prompt
      - بازنویسی پرامپت
      - اصلاح پرامپت
      - بهتر کردن پرامپت
    confidence_threshold: 0.75

  repo_review:
    enabled: true
    priority: 82
    keywords:
      - repository audit
      - repository critique
      - repository analysis
      - source audit
      - source critique
      - بررسی ریپو
      - بررسی مخزن
      - ممیزی سورس
      - بررسی سورس
    patterns:
      - 'repository[\s\S]*audit'
      - 'source[\s\S]*audit'
      - 'بررسی[\s\S]*ریپو'
      - 'بررسی[\s\S]*مخزن'
    confidence_threshold: 0.8

  coding_debugging:
    enabled: true
    priority: 82
    keywords:
      - code review
      - review code
      - debug code
      - debugging
      - runtime error
      - failing test
      - patch protocol
      - بررسی کد
      - دیباگ
      - خطای کد
      - خطای تست
      - اصلاح کد
    patterns:
      - 'code[\s\S]*review'
      - 'debug[\s\S]*code'
      - 'failing[\s\S]*test'
      - 'بررسی[\s\S]*کد'
      - 'خطای[\s\S]*کد'
    confidence_threshold: 0.8

  image:
    enabled: true
    priority: 65
    keywords:
      - عکس
      - تصویر
      - پرتره
      - ویرایش عکس
      - image
      - photo
      - portrait
    negative_keywords:
      - exact text
      - logo fidelity
      - text logo reliability
      - متن دقیق
      - لوگوی دقیق
      - لوگو
    patterns:
      - 'پرامپت.*تصویر'
      - 'ویرایش.*عکس'
      - 'عکس.*پرامپت'
    confidence_threshold: 0.8
