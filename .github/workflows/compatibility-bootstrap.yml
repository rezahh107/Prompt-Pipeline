name: Compatibility Bootstrap

on:
  pull_request:

permissions:
  contents: read

jobs:
  source-identity:
    name: Pinned consumer source identity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TESTED_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout exact target head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TESTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
      - name: Verify target identity
        run: test "$(git rev-parse HEAD)" = "$TESTED_SHA"
      - name: Checkout pinned PR-Inspector source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/PR-Inspector
          ref: f0f74bba89e4c85f4a4b10c706a2be2980d71c25
          path: inspector
          fetch-depth: 1
          persist-credentials: false
      - name: Record registry source identity
        run: |
          set -euo pipefail
          test "$(git -C inspector rev-parse HEAD)" = "f0f74bba89e4c85f4a4b10c706a2be2980d71c25"
          source="inspector/protocols/v1.11.0/registries/DECISION_REASON_REGISTRY.yaml"
          sha256sum "$source" | tee registry-source-sha256.txt
          cp "$source" DECISION_REASON_REGISTRY.v1.11.0.yaml
      - name: Upload source identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compatibility-source-identity
          path: |
            registry-source-sha256.txt
            DECISION_REASON_REGISTRY.v1.11.0.yaml
          if-no-files-found: error
          retention-days: 2
