name: Repair Source Bootstrap

on:
  pull_request:

permissions:
  contents: read

jobs:
  source-snapshot:
    name: Exact source snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TESTED_SHA: ${{ github.event.pull_request.head.sha }}
      INSPECTOR_SHA: f0f74bba89e4c85f4a4b10c706a2be2980d71c25
    steps:
      - name: Checkout exact target head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TESTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
      - name: Verify target identity and clean tree
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TESTED_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Checkout pinned PR-Inspector source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/PR-Inspector
          ref: ${{ env.INSPECTOR_SHA }}
          path: .repair-inspector
          fetch-depth: 1
          persist-credentials: false
      - name: Verify inspector identity and prepare snapshot
        run: |
          set -euo pipefail
          test "$(git -C .repair-inspector rev-parse HEAD)" = "$INSPECTOR_SHA"
          test -z "$(git -C .repair-inspector status --porcelain=v1 --untracked-files=all)"
          mkdir -p repair-source/inspector
          cp .repair-inspector/protocols/v1.11.0/registries/DECISION_REASON_REGISTRY.yaml repair-source/inspector/
          cp .repair-inspector/pr_inspector/decision_projection.py repair-source/inspector/
          printf 'target_sha=%s\ninspector_sha=%s\n' "$TESTED_SHA" "$INSPECTOR_SHA" > repair-source/identity.txt
          tar --exclude=.git --exclude=.repair-inspector --exclude=repair-source -czf repair-source/prompt-pipeline.tar.gz .
          sha256sum repair-source/prompt-pipeline.tar.gz repair-source/inspector/* > repair-source/sha256.txt
      - name: Upload exact source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repair-source-snapshot
          path: repair-source
          if-no-files-found: error
          retention-days: 2
