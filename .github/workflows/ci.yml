name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: PEaC self tests
        run: pnpm peac:selftest
      - name: PEaC router tests
        run: pnpm peac:routertest
      - name: PEaC domain tests
        run: pnpm peac:domaintest
      - name: Static validation
        run: |
          set -o pipefail
          pnpm peac:validate 2>&1 | tee peac-validate.log
      - name: Local rubric evaluation
        run: pnpm peac:eval
      - name: Upload validation log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: peac-validation-log
          path: peac-validate.log
      - name: Rule drift check
        run: pnpm peac:sync -- --check
      - name: Smoke generate artifact
        run: pnpm peac:smoke
